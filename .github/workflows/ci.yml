name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (all targets)
        run: cargo clippy --all-targets --exclude argos-ui -- -D warnings
      - name: Build
        run: cargo build --verbose --exclude argos-ui
      - name: Test (unit)
        run: cargo test --lib --verbose --exclude argos-ui
      - name: Doc
        run: cargo doc --no-deps --document-private-items --exclude argos-ui

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (all targets)
        run: cargo clippy --all-targets --exclude argos-ui -- -D warnings
      - name: Build
        run: cargo build --verbose --exclude argos-ui
      - name: Test (unit)
        run: cargo test --lib --verbose --exclude argos-ui

  tauri:
    name: Tauri UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: argos-ui/pnpm-lock.yaml
      - name: Build frontend
        working-directory: argos-ui
        run: |
          pnpm install
          pnpm build
      - name: Build Tauri backend
        run: cargo build -p argos-ui --verbose
      - name: Test Tauri backend
        run: cargo test -p argos-ui --lib --verbose
