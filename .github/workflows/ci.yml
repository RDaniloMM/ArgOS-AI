name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove Windows-specific toolchain config for CI
        run: rm -f rust-toolchain.toml .cargo/config.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude argos-ui --exclude argos-wasm --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude argos-ui --exclude argos-wasm

      - name: Test
        run: cargo test --workspace --exclude argos-ui --exclude argos-wasm
